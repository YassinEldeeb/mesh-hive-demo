name: "mesh-hive-demo"
services:
  gateway:
    image: ghcr.io/ardatan/mesh-serve:47cef33
    ports:
      - "4000:4000"
    env_file:
      - ./gateway/.env
    volumes:
      - ./gateway/mesh.config.ts:/serve/mesh.config.ts
      - ./gateway/supergraph.docker.graphql:/serve/supergraph.graphql
    healthcheck:
      test: curl --fail http://localhost:4000 || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    command: ["--supergraph", "./supergraph.graphql"]
    networks:
      - graphql

  comments_subgraph:
    build:
      context: ./subgraphs/comments/
      dockerfile: ../Dockerfile
    ports:
      - "4002:4002"
    environment:
      HMAC_SIGNING_SECRET: topsecret
    healthcheck:
      test: curl --fail http://localhost:4002 || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    networks:
      - graphql

  users_subgraph:
    build:
      context: ./subgraphs/users/
      dockerfile: ../Dockerfile
    environment:
      HMAC_SIGNING_SECRET: topsecret
    ports:
      - "4001:4001"
    healthcheck:
      test: curl --fail http://localhost:4002 || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    networks:
      - graphql
networks:
  graphql: {}
